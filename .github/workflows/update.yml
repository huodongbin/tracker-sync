name: Auto Update Trackers

on:
  schedule:
    # 使用 cron 表达式，这里设置的是每天 UTC 时间 08:00 执行（对应北京时间早上 16:00）
    - cron: '0 8 * * *'
  workflow_dispatch: # 允许你在 Actions 页面手动点击按钮触发运行，方便测试

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python script
        run: python update_trackers.py

      - name: Commit and push changes
        run: |
          # 配置 Git 机器人信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加生成的 txt 文件
          git add trackers.txt
          
          # 检查是否有文件变更，如果有则提交并推送，没有变更则跳过，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trackers list" && git push)
